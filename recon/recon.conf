# ═══════════════════════════════════════════════════════
#  RECON TOOLKIT — Configuração Global
#  Edite este arquivo para customizar o comportamento
# ═══════════════════════════════════════════════════════

# ── Threads ──
THREADS_FFUF=50          # Threads para ffuf (dirs, vhosts, params)
THREADS_GOBUSTER=50      # Threads para gobuster
THREADS_HTTPX=50         # Threads para httpx (alive check)
THREADS_KATANA=20        # Threads para katana (crawler)
THREADS_GAU=5            # Threads para gau
THREADS_ALIVE=20         # Processos paralelos no alive check (curl fallback)

# ── Timeouts (segundos) ──
TIMEOUT_CURL=5           # Timeout padrão do curl
TIMEOUT_FFUF=10          # Timeout por request do ffuf
TIMEOUT_GAU=120          # Timeout global do gau
TIMEOUT_AMASS=180        # Timeout do amass
TIMEOUT_KATANA=10        # Timeout por request do katana

# ── Rate Limiting ──
RATE_LIMIT=0             # Requests por segundo (0 = sem limite)
RATE_LIMIT_ADAPTIVE=true # Reduzir threads se detectar 429/WAF
RATE_LIMIT_MIN_THREADS=5 # Mínimo de threads ao adaptar

# ── Wordlists customizadas (prioridade) ──
# Adicione caminhos para suas wordlists aqui
# O sistema procura nestes diretórios na ordem
CUSTOM_WORDLIST_DIRS=(
    "$HOME/Aulas/txts_uteis"
    "$HOME/wordlists"
    "/usr/share/seclists/Discovery/Web-Content"
    "/usr/share/wordlists"
)

# ── Extensões padrão (quando usar modo auto) ──
DEFAULT_EXTENSIONS=".php,.html,.txt,.bak,.old,.conf,.sql,.json,.xml,.yml"

# ── Filtros ──
FILTER_STATUS_CODES="200,204,301,302,307,401"  # Status codes aceitos
BLOCK_STATUS_CODES="404"                        # Status codes bloqueados

# ── Crawling ──
CRAWL_DEPTH=3            # Profundidade padrão do crawler
CRAWL_SCOPE="strict"     # strict = só mesmo domínio, loose = inclui subdomínios

# ── Output ──
REPORT_FORMAT="both"     # txt, html, both
CLEAN_ANSI=true          # Limpar códigos ANSI dos outputs
VERBOSE=false            # Mostrar output detalhado das ferramentas

# ── Ferramentas extras (caminhos) ──
# Deixe vazio para detecção automática
GAU_PATH=""
KATANA_PATH=""
URO_PATH=""
HTTPX_PATH=""
